# ==============================================================================
# PRODUCTION PROFILE
# Activate with: SPRING_PROFILES_ACTIVE=prod
# ==============================================================================

# Override default logging for production
logging.level.com.capstone.mbservices=WARN
spring.jpa.show-sql=false

# Use 'validate' in production to prevent accidental schema changes
spring.jpa.hibernate.ddl-auto=validate

# CORS - override with your production domain
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:https://your-domain.com}

# Frontend URL (for emails, password reset links)
app.frontend.url=${APP_FRONTEND_URL:https://your-domain.com}

# VNPay - production callback URLs
vnpay.return-url=${VNPAY_RETURN_URL:https://your-domain.com/checkout/payment-result}
vnpay.notify-url=${VNPAY_NOTIFY_URL:https://your-api-domain.com/api/orders/vnpay-ipn}

# ZaloPay - production redirect URL
zalopay.redirect-url=${ZALOPAY_REDIRECT_URL:https://your-domain.com/checkout/payment-result}

# Momo - production callback URLs
momo.return-url=${MOMO_RETURN_URL:https://your-domain.com/checkout/payment-result}
momo.notify-url=${MOMO_NOTIFY_URL:https://your-api-domain.com/api/orders/momo-ipn}
