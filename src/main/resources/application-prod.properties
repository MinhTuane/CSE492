# ==============================================================================
# PRODUCTION PROFILE
# Activate with: SPRING_PROFILES_ACTIVE=prod
# ==============================================================================

# Override default logging for production
logging.level.com.capstone.mbservices=WARN
spring.jpa.show-sql=false

# Use 'update' to auto-create/update schema (use 'validate' only after schema is stable)
spring.jpa.hibernate.ddl-auto=update

# CORS - override with your production domain
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:https://mbservices.io.vn}

# Frontend URL (for emails, password reset links)
app.frontend.url=${APP_FRONTEND_URL:https://mbservices.io.vn}

# VNPay - production callback URLs
vnpay.return-url=${VNPAY_RETURN_URL:https://mbservices.io.vn/checkout/payment-result}
vnpay.notify-url=${VNPAY_NOTIFY_URL:https://mbservices.io.vn/api/orders/vnpay-ipn}

# ZaloPay - production redirect URL
zalopay.redirect-url=${ZALOPAY_REDIRECT_URL:https://mbservices.io.vn/checkout/payment-result}

# Momo - production callback URLs
momo.return-url=${MOMO_RETURN_URL:https://mbservices.io.vn/checkout/payment-result}
momo.notify-url=${MOMO_NOTIFY_URL:https://mbservices.io.vn/api/orders/momo-ipn}
