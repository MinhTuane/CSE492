# CORS (comma-separated patterns; avoids wildcard + credentials issues)
app.cors.allowed-origin-patterns=http://localhost:*,http://127.0.0.1:*

spring.application.name=mbservices
spring.datasource.url=jdbc:sqlserver://localhost;databaseName=mbservices;encrypt=false;
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:1234}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true
spring.jpa.open-in-view=true
spring.jpa.properties.hibernate.default_batch_fetch_size=100

# Server Configuration
server.port=8091
server.servlet.context-path=/api

# JWT Configuration
jwt.secret=${JWT_SECRET:mySecretKey123456789012345678901234567890SecureKeyForJWT}
jwt.expiration=86400000

# Jackson
spring.jackson.serialization.FAIL_ON_EMPTY_BEANS=false

# Cloudinary Configuration 
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.com.capstone.mbservices=DEBUG

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:mbservices.notification@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your_app_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

google.client.id=${GOOGLE_CLIENT_ID:}
google.client.secret=${GOOGLE_CLIENT_SECRET:}
facebook.app.id=${FACEBOOK_APP_ID:}
facebook.app-secret=${FACEBOOK_APP_SECRET:}

# AI Chatbot Configuration (Google Gemini Free)
